name: Refresh Typeform data

on:
  schedule:
    # Daily at 06:00 UTC (~01:00 in Buenos Aires).
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract + normalize
        env:
          TYPEFORM_API_KEY: ${{ secrets.TYPEFORM_API_KEY }}
        run: bun run refresh

      - name: Commit changes (if any)
        run: |
          git config user.name  "axialent-data-bot"
          git config user.email "axialent-data-bot@users.noreply.github.com"
          # Only commit the normalized layer — raw extract data stays local-only (.gitignore).
          git add data/normalized
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          NEW=$(jq '.new_forms | length' data/normalized/changelog.json 2>/dev/null || echo 0)
          UPD=$(jq '.updated_forms | length' data/normalized/changelog.json 2>/dev/null || echo 0)
          git commit -m "[skip ci] Refresh Typeform data — ${NEW} new / ${UPD} updated"
          git push
